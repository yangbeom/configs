# Thanks to
# sastrato - https://github.com/sstrato
# junegunn - https://github.com/junegunn

# Hierarchy:
# Server
# +- Session
#  +- Window
#   +- Pane

# Options:
# - Session options (set [-g])
# - Window options (setw [-g])
# - Bind key (bind)

# -----------------------------------------------------------------------------
# Seesion options
# -----------------------------------------------------------------------------
# Change bind key to ctrl-a
unbind-key c-b
set -g prefix c-a

# Index starts from 1
set -g base-index 1

# Renumber windws a window is closed
set -g renumber-windows on

# History
set -g history-limit 102400

# Repeat time limit (ms)
set -g repeat-time 500

# 256-color terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
# Key binding in the status line (bind-key :)
set -g status-keys vi

# Mouse
set -g mouse on

# -----------------------------------------------------------------------------
# Window options
# -----------------------------------------------------------------------------
# Copy-mode
setw -g mode-keys vi

# -----------------------------------------------------------------------------
# Vi copy mode bindings
# -----------------------------------------------------------------------------
# Enter copy mode with prefix + [
# v: start selection
# y: copy selection
# p: paste

# Start selection with 'v'
bind -T copy-mode-vi v send-keys -X begin-selection

# Rectangle selection with 'C-v'
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Yank (copy) with 'y' - also copy to system clipboard (macOS)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Copy selection on mouse drag end (if mouse enabled)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste with prefix + p
bind p paste-buffer

# Paste from system clipboard with prefix + P
bind P run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Enter copy mode with prefix + Escape
bind Escape copy-mode

# Cancel copy mode with Escape
bind -T copy-mode-vi Escape send-keys -X cancel

# -----------------------------------------------------------------------------
# Key bindings
# -----------------------------------------------------------------------------
# prefix c
bind c new-window -c "#{pane_current_path}"

# ctrl-a ctrl-a
bind c-a last-window

# ctrl-a a
bind a send-prefix

# ctrl-a |
bind | split-window -h -c "#{pane_current_path}"

# ctrl-a -
bind - split-window -c "#{pane_current_path}"

# Moving windows
bind -r > swap-window -t :+
bind -r < swap-window -t :-

# Back and forth
bind bspace previous-window
bind space next-window
bind / next-layout # Overridden

# Pane-movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind tab select-pane -t :.+
bind btab select-pane -t :.-

# Synchronize panes
bind * setw synchronize-pane

# Reload ~/.tmux.conf
bind R source-file ~/.tmux.conf \; display-message "Reloaded!"

# Capture pane and open in Vim (capture first, then open in a new window)
bind C-c capture-pane -S -102400 -b __pane_capture__ \; new-window "tmux show-buffer -b __pane_capture__ | nvim -"

# Resizing pane
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# -----------------------------------------------------------------------------
# Decoration (256-color)
# -----------------------------------------------------------------------------
set -g status-justify "left"
set -g status-left ""
set -g status-left-length 100
set -g status-style "bg=#1f2335,fg=#c0caf5"
set -g status-left-style "bg=#1f2335,fg=#c0caf5"
set -g status-right-style "bg=#1f2335,fg=#c0caf5"
set -g status-right-length 100
set -g status-interval 60

# Show session name on the right side of the status bar (이슈 #1)
set -g status-right '#[fg=#d5b26f][#S]'

set -g pane-border-style "fg=#3b4261,bg=#161a27"
set -g pane-active-border-style "fg=#6ea08b,bg=#1f2335"
set -g pane-border-lines heavy
set -g message-style "bg=#1f2335,fg=#6ea08b"
set -g message-command-style "bg=#1f2335,fg=#d5b26f"
set -g mode-style "bg=#d5b26f,fg=#1a1b26"
set -g window-style "bg=#161a27,fg=#747c98"
set -g window-active-style "bg=#1f2335,fg=#c0caf5"

setw -g window-status-style "bg=#24283b,fg=#9aa5ce"
setw -g window-status-current-style "bg=#6ea08b,fg=#1a1b26,bold"
setw -g window-status-activity-style "bg=#24283b,fg=#7d8fb0"
setw -g window-status-bell-style "bg=#24283b,fg=#b35b54"

setw -g window-status-format '#[bg=#2a3048,fg=#7d8fb0] #I #[bg=#24283b,fg=#a9b1d6] #W #[bg=#2a3048,fg=#d5b26f]#F#[bg=#24283b] '
setw -g window-status-current-format '#[bg=#5a8a75,fg=#1a1b26,bold] #I #[bg=#6ea08b,fg=#1a1b26,bold] #W #[bg=#5a8a75,fg=#1a1b26,bold]#F#[bg=#1f2335] '
